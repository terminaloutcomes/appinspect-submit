version: 2
updates:
- package-ecosystem: uv
  directory: /
  schedule:
    interval: weekly
    day: saturday
    time: "02:00"
    timezone: "Australia/Brisbane"
  groups:
    uv:
      patterns:
        - "*"
    uv-security:
      applies-to: security-updates
      patterns:
        - "*"
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: saturday
    time: "02:00"
    timezone: "Australia/Brisbane"
  groups:
    github-actions:
      patterns:
        - "*"
    github-actions-security:
      applies-to: security-updates
      patterns:
        - "*"
